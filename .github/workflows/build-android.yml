name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar el Android SDK
        uses: android-actions/setup-android@v3

      - name: Dar permisos de ejecución a Gradle
        run: chmod +x gradlew || true

      - name: Generar el wrapper de Gradle si no existe
        run: gradle wrapper --gradle-version 8.9

      - name: Compilar APK de debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Subir el APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: SpeedTracker-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
